name: Deploy GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  SITE_DIR: docs/wasm-demo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen CLI
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.118

      - name: Build minigu-wasm
        run: cargo build -p minigu-wasm --target wasm32-unknown-unknown --release

      - name: Assemble Pages site
        run: |
          mkdir -p site/pkg
          cp "$SITE_DIR"/index.html "$SITE_DIR"/main.js "$SITE_DIR"/style.css "$SITE_DIR"/.nojekyll site/
          "$HOME/.cargo/bin/wasm-bindgen" \
            --target web \
            --out-dir site/pkg \
            target/wasm32-unknown-unknown/release/minigu_wasm.wasm

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
